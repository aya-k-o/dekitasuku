services:

  # --- PHP + Apache ---
  php:
    build: .
    container_name: dekitasuku_php
    ports:
      - "8080:80"        # ブラウザで http://localhost:8080 にアクセス
    volumes:
      - .:/var/www/html  # このフォルダの中身をコンテナと共有
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}

  # --- MySQL ---
  db:
    image: mysql:8.0
    container_name: dekitasuku_db
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - db_data:/var/lib/mysql                                   # DBデータを永続化
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql  # 初回起動時にSQL自動実行
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  # --- phpMyAdmin（ブラウザでDBを操作できる管理画面）---
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: dekitasuku_phpmyadmin
    ports:
      - "8081:80"        # ブラウザで http://localhost:8081 にアクセス
    environment:
      PMA_HOST: db
      PMA_USER: ${DB_USER}
      PMA_PASSWORD: ${DB_PASS}
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:  # MySQLのデータを保存する名前付きボリューム
